<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dr. [Doctor Name] — Expert General Physician with 10+ years experience in [City Name]. Book your appointment today for expert medical consultation." />
  <meta name="keywords" content="general physician, doctor, medical consultation, health checkup, [City Name] doctor" />
  <meta name="author" content="Dr. [Doctor Name]" />
  <meta property="og:title" content="Dr. [Doctor Name] | General Physician" />
  <meta property="og:description" content="Expert General Physician with 10+ years experience. Book your appointment now." />
  <meta property="og:type" content="website" />
  <title>Dr. [Doctor Name] | General Physician | [City Name]</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />

  <style>
    /* ==============================
       CSS RESET & VARIABLES
    ============================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --blue-900: #0a1628;
      --blue-800: #0d2240;
      --blue-700: #1a3a5c;
      --blue-600: #1e50a0;
      --blue-500: #2563eb;
      --blue-400: #3b82f6;
      --blue-300: #93c5fd;
      --blue-100: #dbeafe;
      --blue-50: #eff6ff;
      --white: #ffffff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
      --gray-900: #0f172a;
      --green-500: #22c55e;
      --green-400: #4ade80;
      --whatsapp: #25d366;
      --whatsapp-dark: #128c7e;

      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-display: 'Playfair Display', Georgia, serif;

      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 40px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.05);
      --shadow-xl: 0 20px 60px rgba(0,0,0,0.12), 0 8px 20px rgba(0,0,0,0.06);
      --shadow-blue: 0 8px 32px rgba(37,99,235,0.20);
      --shadow-blue-lg: 0 16px 48px rgba(37,99,235,0.28);

      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --radius-full: 9999px;

      --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
      --transition-slow: 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: var(--font-sans);
      color: var(--gray-800);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    ul {
      list-style: none;
    }

    /* ==============================
       LOADING SCREEN
    ============================== */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--blue-900);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-cross {
      width: 56px;
      height: 56px;
      position: relative;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .loader-cross::before,
    .loader-cross::after {
      content: '';
      position: absolute;
      background: var(--white);
      border-radius: 4px;
    }

    .loader-cross::before {
      width: 12px; height: 56px;
      left: 50%; transform: translateX(-50%);
    }

    .loader-cross::after {
      height: 12px; width: 56px;
      top: 50%; transform: translateY(-50%);
    }

    .loader-text {
      margin-top: 24px;
      color: var(--blue-300);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.9); opacity: 0.7; }
    }

    /* ==============================
       TYPOGRAPHY UTILITIES
    ============================== */
    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--blue-50);
      color: var(--blue-600);
      font-size: clamp(0.7rem, 1.5vw, 0.8rem);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: var(--radius-full);
      border: 1px solid var(--blue-100);
      margin-bottom: 14px;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 4vw, 2.8rem);
      font-weight: 700;
      line-height: 1.2;
      color: var(--gray-900);
      margin-bottom: 16px;
    }

    .section-title span {
      color: var(--blue-500);
    }

    .section-subtitle {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: var(--gray-500);
      max-width: 560px;
      margin-inline: auto;
      line-height: 1.7;
    }

    .section-header {
      text-align: center;
      margin-bottom: clamp(40px, 6vw, 64px);
    }

    /* ==============================
       LAYOUT UTILITIES
    ============================== */
    .container {
      width: 100%;
      max-width: 1200px;
      margin-inline: auto;
      padding-inline: clamp(16px, 4vw, 40px);
    }

    section {
      padding-block: clamp(60px, 8vw, 100px);
    }

    /* ==============================
       BUTTONS
    ============================== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: clamp(0.875rem, 1.8vw, 0.95rem);
      border: none;
      cursor: pointer;
      border-radius: var(--radius-full);
      transition: var(--transition);
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue-500) 0%, var(--blue-600) 100%);
      color: var(--white);
      padding: 14px 28px;
      box-shadow: var(--shadow-blue);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-blue-lg);
      background: linear-gradient(135deg, var(--blue-400) 0%, var(--blue-500) 100%);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-whatsapp {
      background: linear-gradient(135deg, var(--whatsapp) 0%, var(--whatsapp-dark) 100%);
      color: var(--white);
      padding: 14px 28px;
      box-shadow: 0 8px 32px rgba(37,211,102,0.25);
    }

    .btn-whatsapp:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 48px rgba(37,211,102,0.35);
    }

    .btn-outline {
      background: transparent;
      color: var(--blue-600);
      padding: 12px 26px;
      border: 2px solid var(--blue-200);
    }

    .btn-outline:hover {
      background: var(--blue-50);
      border-color: var(--blue-400);
      transform: translateY(-2px);
    }

    /* ==============================
       NAVBAR
    ============================== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      transition: var(--transition);
      padding: 0;
    }

    .navbar.scrolled {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 1px 0 var(--gray-200), var(--shadow-md);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-block: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--blue-500), var(--blue-700));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-blue);
      flex-shrink: 0;
    }

    .nav-logo-icon svg {
      width: 22px;
      height: 22px;
      fill: white;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
    }

    .nav-logo-name {
      font-weight: 700;
      font-size: clamp(0.9rem, 2vw, 1rem);
      color: var(--gray-900);
      line-height: 1.2;
    }

    .navbar:not(.scrolled) .nav-logo-name {
      color: white;
    }

    .nav-logo-title {
      font-size: 0.72rem;
      color: var(--gray-500);
      font-weight: 500;
    }

    .navbar:not(.scrolled) .nav-logo-title {
      color: rgba(255,255,255,0.75);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: clamp(20px, 3vw, 36px);
    }

    .nav-links a {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--gray-700);
      transition: color var(--transition);
      position: relative;
    }

    .navbar:not(.scrolled) .nav-links a {
      color: rgba(255,255,255,0.88);
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--blue-500);
      transform: scaleX(0);
      transition: transform var(--transition);
      border-radius: 2px;
    }

    .nav-links a:hover::after {
      transform: scaleX(1);
    }

    .nav-links a:hover {
      color: var(--blue-500);
    }

    .navbar:not(.scrolled) .nav-links a:hover {
      color: white;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-tel {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--blue-600);
      padding: 8px 14px;
      border-radius: var(--radius-full);
      background: var(--blue-50);
      transition: var(--transition);
      border: 1px solid var(--blue-100);
    }

    .navbar:not(.scrolled) .nav-tel {
      color: white;
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.2);
    }

    .nav-tel:hover {
      background: var(--blue-100);
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: var(--radius-sm);
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--gray-800);
      border-radius: 2px;
      transition: var(--transition);
    }

    .navbar:not(.scrolled) .hamburger span {
      background: white;
    }

    .hamburger.open span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }
    .hamburger.open span:nth-child(2) {
      opacity: 0;
    }
    .hamburger.open span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10,22,40,0.97);
      backdrop-filter: blur(20px);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
    }

    .mobile-menu.open {
      opacity: 1;
      visibility: visible;
    }

    .mobile-menu a {
      color: white;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: 600;
      transition: color var(--transition);
    }

    .mobile-menu a:hover {
      color: var(--blue-300);
    }

    .mobile-menu-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-full);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 1.4rem;
      transition: var(--transition);
    }

    .mobile-menu-close:hover {
      background: rgba(255,255,255,0.2);
    }

    /* ==============================
       HERO SECTION
    ============================== */
    .hero {
      position: relative;
      min-height: 100svh;
      background: linear-gradient(145deg, var(--blue-900) 0%, var(--blue-800) 40%, #0f2d55 70%, var(--blue-700) 100%);
      overflow: hidden;
      display: flex;
      align-items: center;
      padding-top: 80px;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 40%, rgba(37,99,235,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 20% 80%, rgba(37,99,235,0.08) 0%, transparent 60%);
    }

    .hero-grid-pattern {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(32px, 5vw, 80px);
      align-items: center;
      padding-block: clamp(40px, 6vw, 80px);
    }

    .hero-text {
      color: white;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      color: var(--blue-200);
      font-size: clamp(0.7rem, 1.5vw, 0.8rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: var(--radius-full);
      margin-bottom: 20px;
      animation: fadeInDown 0.7s ease both;
    }

    .hero-badge-dot {
      width: 7px;
      height: 7px;
      background: var(--green-400);
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 8px;
      animation: fadeInUp 0.7s ease 0.1s both;
    }

    .hero-title-name {
      background: linear-gradient(135deg, #fff 0%, var(--blue-200) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-specialty {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-weight: 500;
      color: var(--blue-300);
      margin-bottom: 20px;
      animation: fadeInUp 0.7s ease 0.15s both;
    }

    .hero-desc {
      font-size: clamp(0.9rem, 1.8vw, 1rem);
      color: rgba(255,255,255,0.75);
      line-height: 1.75;
      margin-bottom: 32px;
      max-width: 480px;
      animation: fadeInUp 0.7s ease 0.2s both;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 40px;
      animation: fadeInUp 0.7s ease 0.25s both;
    }

    .hero-trust {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      animation: fadeInUp 0.7s ease 0.3s both;
    }

    .hero-trust-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.8);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .hero-trust-icon {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.12);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }

    .hero-image-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      animation: fadeInRight 0.8s ease 0.2s both;
    }

    .hero-image-card {
      position: relative;
      width: min(380px, 90%);
    }

    .hero-image-bg {
      position: absolute;
      inset: -24px;
      background: linear-gradient(135deg, rgba(37,99,235,0.3), rgba(37,99,235,0.05));
      border-radius: 40px;
      filter: blur(30px);
    }

    .hero-image-frame {
      position: relative;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 20px;
      overflow: hidden;
    }

    .hero-doctor-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      border-radius: 20px;
      background: linear-gradient(160deg, #1e50a0 0%, #0a1628 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-doctor-placeholder {
      width: 100%;
      aspect-ratio: 3/4;
      background: linear-gradient(160deg, rgba(37,99,235,0.4) 0%, rgba(10,22,40,0.8) 100%);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .hero-doctor-silhouette {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 75%;
      opacity: 0.6;
    }

    .hero-stats-float {
      position: absolute;
      display: flex;
      flex-direction: column;
      gap: 10px;
      right: -20px;
      top: 50%;
      transform: translateY(-50%);
    }

    .hero-stat-chip {
      background: rgba(255,255,255,0.95);
      border-radius: 14px;
      padding: 10px 14px;
      box-shadow: var(--shadow-lg);
      min-width: 130px;
      backdrop-filter: blur(20px);
    }

    .hero-stat-chip-num {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--blue-600);
      line-height: 1;
    }

    .hero-stat-chip-label {
      font-size: 0.7rem;
      color: var(--gray-500);
      font-weight: 500;
      margin-top: 2px;
    }

    .hero-rating-chip {
      position: absolute;
      bottom: 28px;
      left: -20px;
      background: rgba(255,255,255,0.95);
      border-radius: 14px;
      padding: 10px 16px;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hero-rating-stars {
      color: #f59e0b;
      font-size: 0.85rem;
      letter-spacing: -1px;
    }

    .hero-rating-text {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--gray-800);
    }

    .hero-stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 48px;
    }

    .hero-stat-item {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-lg);
      padding: 20px 14px;
      text-align: center;
    }

    .hero-stat-num {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      color: white;
      line-height: 1;
    }

    .hero-stat-label {
      font-size: clamp(0.7rem, 1.2vw, 0.8rem);
      color: var(--blue-300);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ==============================
       ABOUT SECTION
    ============================== */
    .about {
      background: var(--white);
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: clamp(40px, 6vw, 80px);
      align-items: center;
    }

    .about-image-wrap {
      position: relative;
    }

    .about-image-card {
      position: relative;
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-xl);
    }

    .about-img {
      width: 100%;
      aspect-ratio: 4/5;
      background: linear-gradient(160deg, var(--blue-100) 0%, var(--blue-50) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-xl);
      position: relative;
      overflow: hidden;
    }

    .about-img-placeholder {
      font-size: 8rem;
      line-height: 1;
      opacity: 0.25;
    }

    .about-exp-badge {
      position: absolute;
      bottom: 24px;
      right: 24px;
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      box-shadow: var(--shadow-xl);
      text-align: center;
    }

    .about-exp-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--blue-600);
      line-height: 1;
    }

    .about-exp-label {
      font-size: 0.72rem;
      color: var(--gray-500);
      font-weight: 500;
      margin-top: 2px;
    }

    .about-pattern {
      position: absolute;
      top: -20px;
      left: -20px;
